name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: cargo test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --quiet

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
